<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sylgrin</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
scroll-behavior:smooth;
}

body{
background:linear-gradient(-45deg,#0f172a,#2563eb,#06b6d4,#14b8a6);
background-size:400% 400%;
animation:bg 10s ease infinite;
color:#fff;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

header{
position:sticky;
top:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 7%;
background:rgba(255,255,255,.1);
backdrop-filter:blur(12px);
z-index:1000;
}

.logo{
display:flex;
align-items:center;
gap:12px;
}

.logo img{
width:55px;
height:55px;
object-fit:contain;
background:white;
padding:4px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.3);
}

.logo h2{
font-size:28px;
font-weight:700;
}

.menu-btn{
background:none;
border:none;
color:white;
font-size:35px;
cursor:pointer;
}

nav{
display:none;
position:absolute;
top:85px;
left:0;
width:100%;
background:rgba(0,0,0,.4);
backdrop-filter:blur(15px);
}

nav.active{
display:block;
animation:slide .4s ease;
}

@keyframes slide{
from{opacity:0;transform:translateY(-20px);}
to{opacity:1;transform:translateY(0);}
}

nav ul{
list-style:none;
}

nav ul li a{
display:block;
padding:18px;
text-align:center;
text-decoration:none;
color:white;
font-size:18px;
transition:.3s;
}

nav ul li a:hover{
background:#38bdf8;
color:#111827;
}

.hero{
min-height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px 20px;
}

.hero img{
width:220px;
max-width:80%;
height:auto;
object-fit:contain;
background:white;
padding:15px;
border-radius:25px;
box-shadow:0 15px 35px rgba(0,0,0,.4);
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-12px);}
}

.hero h1{
margin-top:30px;
font-size:55px;
}

.hero p{
margin-top:20px;
font-size:20px;
max-width:750px;
line-height:1.7;
}

.btn{
margin-top:35px;
display:inline-block;
padding:15px 40px;
background:#06b6d4;
color:white;
text-decoration:none;
border-radius:50px;
font-size:20px;
transition:.4s;
}

.btn:hover{
background:#2563eb;
transform:translateY(-5px);
box-shadow:0 10px 25px rgba(0,0,0,.3);
}

@media(min-width:992px){

.menu-btn{
display:none;
}

nav{
display:block;
position:static;
width:auto;
background:none;
}

nav ul{
display:flex;
gap:35px;
}

nav ul li a{
padding:10px 18px;
border-radius:30px;
}

.hero h1{
font-size:70px;
}

.hero p{
font-size:22px;
}

.hero img{
width:280px;
}
}
</style>
</head>

<body>

<header>

<div class="logo">
<img src="logo.png" alt="Sylgrin Logo">
<h2>Sylgrin</h2>
</div>

<button class="menu-btn" id="menuBtn" aria-label="Open Menu" aria-expanded="false" aria-controls="menu">
☰
</button>

<nav id="menu">
<ul>
<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Services</a></li>
<li><a href="#">Portfolio</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>

</header>

<section class="hero">

<img src="logo.png" alt="Sylgrin Logo">

<h1>Welcome to Sylgrin</h1>

<p>
A modern, colorful, mobile-first responsive website with an accessible navigation bar,
glassmorphism effects, smooth animations, and a beautiful user experience.
</p>

<a href="#" class="btn">Get Started</a>

</section>

<script>
const btn=document.getElementById("menuBtn");
const nav=document.getElementById("menu");

btn.addEventListener("click",()=>{
nav.classList.toggle("active");
btn.setAttribute("aria-expanded",nav.classList.contains("active"));
});
</script>

</body>
</html>
